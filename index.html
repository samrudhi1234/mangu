<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mangu & The Annoying Bee 🐝</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: #ffe082;
    text-shadow: 0 0 20px #ffb300aa;
    margin-bottom: 12px;
    letter-spacing: 1px;
    z-index: 10;
    position: relative;
  }

  /* ===== SCENE ===== */
  #scene {
    width: 700px;
    height: 480px;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 0 80px #7c4dff55, 0 0 0 3px #7c4dff44;
    cursor: default;
  }

  /* Sky gradient - day */
  #sky {
    position: absolute; inset: 0;
    background: linear-gradient(170deg, #1565c0 0%, #42a5f5 40%, #80deea 70%, #a5d6a7 70%, #66bb6a 100%);
    transition: background 1s;
  }

  /* Sun */
  #sun {
    position: absolute;
    width: 80px; height: 80px;
    background: radial-gradient(circle at 40% 40%, #fff9c4, #ffeb3b 50%, #ffa000);
    border-radius: 50%;
    top: 30px; right: 100px;
    box-shadow: 0 0 40px 10px #ffeb3b88, 0 0 80px 20px #ffb30044;
    animation: sunPulse 3s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 40px 10px #ffeb3b88, 0 0 80px 20px #ffb30044; }
    50% { box-shadow: 0 0 60px 20px #ffeb3baa, 0 0 120px 40px #ffb30066; }
  }
  /* Sun rays */
  .sun-ray {
    position: absolute;
    width: 4px;
    height: 30px;
    background: linear-gradient(to bottom, #ffeb3b88, transparent);
    border-radius: 2px;
    top: 50%; left: 50%;
    transform-origin: 0 -50px;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    animation: cloudDrift linear infinite;
  }
  .cloud-body {
    background: white;
    border-radius: 50px;
    position: relative;
    opacity: 0.9;
  }
  .cloud-body::before, .cloud-body::after {
    content: '';
    background: white;
    border-radius: 50%;
    position: absolute;
  }
  #cloud1 { top: 40px; animation-duration: 40s; animation-delay: -10s; }
  #cloud1 .cloud-body { width: 110px; height: 35px; }
  #cloud1 .cloud-body::before { width: 55px; height: 55px; top: -28px; left: 12px; }
  #cloud1 .cloud-body::after { width: 44px; height: 44px; top: -20px; left: 50px; }

  #cloud2 { top: 75px; animation-duration: 55s; animation-delay: -20s; }
  #cloud2 .cloud-body { width: 85px; height: 27px; opacity: 0.8; }
  #cloud2 .cloud-body::before { width: 42px; height: 42px; top: -22px; left: 10px; }
  #cloud2 .cloud-body::after { width: 34px; height: 34px; top: -15px; left: 40px; }

  @keyframes cloudDrift {
    from { transform: translateX(-200px); }
    to { transform: translateX(900px); }
  }

  /* Mountains far */
  #mountains {
    position: absolute;
    bottom: 130px; left: 0;
    width: 100%; height: 160px;
  }
  .mountain {
    position: absolute;
    bottom: 0;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }

  /* Ground */
  #ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 130px;
    background: linear-gradient(to bottom, #66bb6a, #388e3c);
    border-top-left-radius: 30% 20px;
    border-top-right-radius: 30% 20px;
  }
  #ground::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 18px;
    background: radial-gradient(ellipse at center, #81c784 0%, #4caf50 60%, transparent 100%);
    border-radius: 50%;
  }

  /* Grass blades */
  .grass {
    position: absolute;
    bottom: 100%;
    width: 5px;
    background: linear-gradient(to top, #2e7d32, #81c784);
    border-radius: 3px 3px 0 0;
    transform-origin: bottom center;
    animation: grassSway 2s ease-in-out infinite;
  }
  @keyframes grassSway {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* Flowers */
  .flower-wrap {
    position: absolute;
    bottom: 100%;
    display: flex; flex-direction: column; align-items: center;
  }
  .flower-stem {
    width: 4px;
    background: linear-gradient(to top, #1b5e20, #66bb6a);
    border-radius: 2px;
  }
  .flower-head {
    width: 28px; height: 28px;
    border-radius: 50%;
    animation: flowerBob 3s ease-in-out infinite;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .flower-head::before {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    opacity: 0.3;
    animation: flowerGlow 3s ease-in-out infinite;
  }
  .flower-center {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ffd54f;
    z-index: 1;
    border: 1.5px solid #f9a825;
  }
  @keyframes flowerBob {
    0%,100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
  }
  @keyframes flowerGlow {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  /* petals */
  .petal {
    position: absolute;
    width: 10px; height: 16px;
    border-radius: 50%;
    transform-origin: bottom center;
  }

  /* ===== MANGU ===== */
  #mangu {
    position: absolute;
    bottom: 118px;
    left: 100px;
    display: flex; flex-direction: column; align-items: center;
    transition: left 0.05s linear;
    z-index: 5;
  }
  .name-tag {
    font-family: 'Baloo 2', cursive;
    font-size: 14px;
    font-weight: 700;
    color: #ffe082;
    text-shadow: 0 0 10px #ff6f00;
    margin-bottom: 3px;
    background: rgba(0,0,0,0.35);
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px solid #ffe08244;
  }

  /* Head */
  .head {
    width: 50px; height: 54px;
    background: radial-gradient(circle at 35% 30%, #ffd180, #f5a623 60%, #e08a10);
    border-radius: 50% 50% 45% 45%;
    position: relative;
    border: 2px solid #c97a10;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2), inset 2px 2px 6px rgba(255,255,255,0.3);
  }
  /* hair */
  .hair {
    position: absolute;
    top: -8px; left: 3px; right: 3px;
    height: 22px;
    background: #1a237e;
    border-radius: 50% 50% 0 0;
    box-shadow: inset 0 3px 6px rgba(255,255,255,0.1);
  }
  .hair::after {
    content: '';
    position: absolute;
    width: 8px; height: 14px;
    background: #1a237e;
    top: 8px; right: -3px;
    border-radius: 50%;
  }
  /* ears */
  .ear {
    position: absolute;
    width: 12px; height: 16px;
    background: radial-gradient(circle at 40% 40%, #ffd180, #e08a10);
    border-radius: 50%;
    top: 14px;
    border: 1.5px solid #c97a10;
  }
  .ear.left { left: -7px; }
  .ear.right { right: -7px; }
  /* eyes */
  .eye-group {
    position: absolute;
    top: 17px;
    display: flex; gap: 14px;
    left: 50%; transform: translateX(-50%);
  }
  .eye {
    width: 10px; height: 11px;
    background: white;
    border-radius: 50%;
    position: relative;
    border: 1px solid #333;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .pupil {
    width: 6px; height: 7px;
    background: #1a237e;
    border-radius: 50%;
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .pupil::after {
    content: '';
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 1px; left: 1px;
  }
  .eyebrow {
    position: absolute;
    width: 12px; height: 3px;
    background: #1a237e;
    border-radius: 2px;
    top: -5px; left: -1px;
    transition: transform 0.3s;
  }
  /* nose */
  .nose {
    position: absolute;
    width: 8px; height: 6px;
    background: #e08a10;
    border-radius: 50%;
    top: 28px; left: 50%; transform: translateX(-50%);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  /* mouth */
  .mouth-wrap {
    position: absolute;
    bottom: 8px;
    left: 50%; transform: translateX(-50%);
    width: 22px;
  }
  .mouth {
    width: 20px; height: 10px;
    border: 2.5px solid #b05510;
    border-top: none;
    border-radius: 0 0 12px 12px;
    transition: all 0.4s;
    position: relative;
  }
  .mouth.scared {
    border-bottom: none; border-top: 2.5px solid #b05510;
    border-radius: 12px 12px 0 0;
    height: 12px;
  }
  /* teeth */
  .teeth {
    position: absolute;
    top: 0; left: 1px;
    display: flex; gap: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tooth {
    width: 5px; height: 5px;
    background: white;
    border-radius: 0 0 2px 2px;
    border: 1px solid #ccc;
  }
  .mouth.scared .teeth { opacity: 1; }

  /* Body */
  .body-wrap {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
  }
  .neck {
    width: 16px; height: 8px;
    background: radial-gradient(circle at 40% 40%, #ffd180, #e08a10);
    border-left: 1.5px solid #c97a10;
    border-right: 1.5px solid #c97a10;
  }
  .shirt {
    width: 58px; height: 52px;
    background: linear-gradient(135deg, #ef5350, #c62828 60%, #b71c1c);
    border-radius: 6px 6px 2px 2px;
    position: relative;
    border: 1.5px solid #7f0000;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.25), inset 2px 2px 6px rgba(255,255,255,0.1);
  }
  .shirt-collar {
    position: absolute;
    top: -2px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 10px;
    background: linear-gradient(135deg, #ef9a9a, #ef5350);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    border-radius: 0 0 6px 6px;
  }
  .shirt-button {
    position: absolute;
    width: 5px; height: 5px;
    background: #fff8;
    border-radius: 50%;
    left: 50%; transform: translateX(-50%);
  }
  /* arms */
  .arm {
    position: absolute;
    width: 14px; height: 44px;
    background: linear-gradient(to bottom, #ef5350, #c62828);
    border-radius: 6px;
    top: 4px;
    border: 1.5px solid #7f0000;
    overflow: visible;
    transition: transform 0.4s;
  }
  .arm.left { left: -12px; transform: rotate(15deg); transform-origin: top center; }
  .arm.right { right: -12px; transform: rotate(-15deg); transform-origin: top center; }
  .arm.left.waving { animation: waveLeft 0.4s ease-in-out 3; }
  .arm.right.waving { animation: waveRight 0.4s ease-in-out 3; }
  @keyframes waveLeft {
    0%,100% { transform: rotate(15deg); }
    50% { transform: rotate(60deg); }
  }
  @keyframes waveRight {
    0%,100% { transform: rotate(-15deg); }
    50% { transform: rotate(-60deg); }
  }
  .hand {
    position: absolute;
    bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px;
    background: radial-gradient(circle at 40% 40%, #ffd180, #e08a10);
    border-radius: 50%;
    border: 1.5px solid #c97a10;
  }
  .pants {
    width: 58px; height: 44px;
    background: linear-gradient(135deg, #1565c0, #0d47a1 60%, #0a3880);
    border-radius: 2px 2px 4px 4px;
    display: flex;
    border: 1.5px solid #01255a;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3);
  }
  .pant-leg {
    flex: 1;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.15));
    border-radius: 0 0 4px 4px;
  }
  .pant-leg:first-child { border-right: 1px solid #0a3880; }
  .shoes-wrap { display: flex; gap: 10px; }
  .shoe {
    width: 22px; height: 14px;
    background: linear-gradient(135deg, #212121, #424242);
    border-radius: 6px 10px 4px 4px;
    border: 1.5px solid #111;
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.1);
  }

  /* ===== BEE ===== */
  #bee {
    position: absolute;
    top: 100px; left: 320px;
    z-index: 8;
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .bee-name {
    font-family: 'Baloo 2', cursive;
    font-size: 11px;
    color: #fff9c4;
    text-align: center;
    margin-bottom: 2px;
    text-shadow: 0 0 6px #ff6f00;
  }
  .bee-container {
    position: relative;
    width: 60px;
    display: flex; flex-direction: column; align-items: center;
  }
  .bee-wings {
    position: absolute;
    top: -10px; left: -12px;
    width: 84px; height: 40px;
    display: flex; gap: 2px;
    justify-content: space-between;
    align-items: flex-end;
  }
  .wing {
    border-radius: 50% 50% 30% 70%;
    background: rgba(200,235,255,0.72);
    border: 1px solid rgba(100,180,220,0.6);
    transform-origin: bottom center;
    box-shadow: inset 0 0 8px rgba(150,210,255,0.4);
  }
  .wing-tl { width: 38px; height: 30px; transform: rotate(-25deg); border-radius: 50% 30% 50% 50%; }
  .wing-tr { width: 38px; height: 30px; transform: rotate(25deg) scaleX(-1); border-radius: 50% 30% 50% 50%; }
  .wing-bl { width: 28px; height: 22px; transform: rotate(-20deg); border-radius: 50%; margin-bottom: 2px; }
  .wing-br { width: 28px; height: 22px; transform: rotate(20deg) scaleX(-1); border-radius: 50%; margin-bottom: 2px; }
  .bee-body {
    width: 48px; height: 30px;
    background: linear-gradient(135deg, #ffe082, #ffd54f 40%, #ffca28);
    border-radius: 50% 40% 50% 50%;
    position: relative;
    border: 1.5px solid #f57f17;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.2), inset 2px 2px 6px rgba(255,255,255,0.3);
    overflow: hidden;
  }
  .bee-stripe {
    position: absolute;
    top: 0; bottom: 0;
    width: 7px;
    background: rgba(30,30,30,0.85);
    border-radius: 2px;
  }
  .bee-head {
    width: 24px; height: 22px;
    background: radial-gradient(circle at 35% 35%, #424242, #1a1a1a);
    border-radius: 50% 50% 40% 40%;
    position: absolute;
    left: -14px; top: 4px;
    border: 1px solid #000;
    box-shadow: inset 1px 1px 4px rgba(255,255,255,0.15);
  }
  .bee-eye-s {
    position: absolute;
    width: 7px; height: 8px;
    background: radial-gradient(circle at 40% 35%, #b2dfdb, #26a69a);
    border-radius: 50%;
    top: 4px; left: 4px;
    border: 1px solid #00796b;
  }
  .bee-eye-s::after {
    content: '';
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 1px; left: 1px;
  }
  .bee-antenna {
    position: absolute;
    width: 2px;
    height: 12px;
    background: #1a1a1a;
    border-radius: 2px;
    top: -10px;
    transform-origin: bottom center;
  }
  .bee-antenna::after {
    content: '';
    width: 6px; height: 6px;
    background: radial-gradient(circle, #ffd54f, #f57f17);
    border-radius: 50%;
    position: absolute;
    top: -5px; left: -2px;
    border: 1px solid #e65100;
  }
  .bee-stinger {
    position: absolute;
    right: -10px; top: 12px;
    width: 12px; height: 8px;
    background: linear-gradient(to right, #ffd54f, #f57f17);
    clip-path: polygon(0 20%, 0 80%, 100% 50%);
    border-radius: 2px;
  }

  /* Wing animations */
  @keyframes flapTopL {
    0%,100% { transform: rotate(-25deg) scaleY(1); }
    50% { transform: rotate(-25deg) scaleY(0.1); }
  }
  @keyframes flapTopR {
    0%,100% { transform: rotate(25deg) scaleX(-1) scaleY(1); }
    50% { transform: rotate(25deg) scaleX(-1) scaleY(0.1); }
  }
  @keyframes flapBotL {
    0%,100% { transform: rotate(-20deg) scaleY(1); }
    50% { transform: rotate(-20deg) scaleY(0.1); }
  }
  @keyframes flapBotR {
    0%,100% { transform: rotate(20deg) scaleX(-1) scaleY(1); }
    50% { transform: rotate(20deg) scaleX(-1) scaleY(0.1); }
  }
  .wing-tl { animation: flapTopL 0.12s linear infinite; }
  .wing-tr { animation: flapTopR 0.12s linear infinite; }
  .wing-bl { animation: flapBotL 0.12s linear infinite; }
  .wing-br { animation: flapBotR 0.12s linear infinite; }

  /* Bubble */
  .bubble {
    position: absolute;
    padding: 7px 12px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 20;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 15px;
    border: 5px solid transparent;
  }
  #bee-bubble {
    background: #fff9c4;
    color: #e65100;
    border: 2px solid #ffb300;
    top: -42px; left: 50%; transform: translateX(-50%);
  }
  #bee-bubble::after { border-top-color: #fff9c4; }
  #mangu-bubble {
    background: #ffebee;
    color: #b71c1c;
    border: 2px solid #ef5350;
    bottom: 130px; left: -10px;
    font-size: 12px;
  }
  #mangu-bubble::after { border-top-color: #ffebee; }

  /* Sweat drops */
  .sweat {
    position: absolute;
    width: 8px; height: 12px;
    background: radial-gradient(circle at 40% 30%, #90caf9, #1565c0);
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* Stars for dizzy */
  .star {
    position: absolute;
    font-size: 16px;
    opacity: 0;
    pointer-events: none;
  }

  /* ===== CONTROLS ===== */
  #controls {
    display: flex; gap: 10px; margin-top: 16px;
    flex-wrap: wrap; justify-content: center;
    z-index: 10; position: relative;
  }
  button {
    padding: 10px 20px;
    border-radius: 30px;
    border: 2px solid;
    font-family: 'Baloo 2', cursive;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    letter-spacing: 0.5px;
    outline: none;
  }
  button:hover { transform: translateY(-2px) scale(1.06); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  button:active { transform: scale(0.97); }
  #btn-attack { background: #ff5722; color: white; border-color: #bf360c; box-shadow: 0 4px 15px #ff572255; }
  #btn-run    { background: #66bb6a; color: white; border-color: #1b5e20; box-shadow: 0 4px 15px #66bb6a55; }
  #btn-circle { background: #ab47bc; color: white; border-color: #4a148c; box-shadow: 0 4px 15px #ab47bc55; }
  #btn-sting  { background: #ffa726; color: white; border-color: #e65100; box-shadow: 0 4px 15px #ffa72655; }
  #btn-reset  { background: #29b6f6; color: white; border-color: #0277bd; box-shadow: 0 4px 15px #29b6f655; }

  #status-bar {
    margin-top: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 16px;
    color: #ffe082;
    text-shadow: 0 0 10px #ff6f0088;
    text-align: center;
    min-height: 24px;
    z-index: 10; position: relative;
  }

  /* Particles */
  .particle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    z-index: 15;
  }
  /* panic shake */
  @keyframes panicShake {
    0%,100% { transform: translateX(0) rotate(0); }
    15% { transform: translateX(-6px) rotate(-4deg); }
    30% { transform: translateX(6px) rotate(4deg); }
    45% { transform: translateX(-4px) rotate(-2deg); }
    60% { transform: translateX(4px) rotate(2deg); }
  }
  /* stung jump */
  @keyframes stungJump {
    0% { transform: translateY(0); }
    30% { transform: translateY(-40px); }
    60% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
  }
</style>
</head>
<body>

<h1>🐝 Mangu & The Annoying Bee 🐝</h1>

<div id="scene">
  <div id="sky"></div>
  <div id="sun">
    <div class="sun-ray" style="transform:rotate(0deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(45deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(90deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(135deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(180deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(225deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(270deg) translateY(-55px)"></div>
    <div class="sun-ray" style="transform:rotate(315deg) translateY(-55px)"></div>

<div id="controls">
  <button id="btn-attack" onclick="beeAttack()">🐝 Bee Attack!</button>
  <button id="btn-run" onclick="manRun()">🏃 Mangu Run!</button>
  <button id="btn-circle" onclick="beeCircle()">🌀 Circle Mangu</button>
  <button id="btn-sting" onclick="beeStings()">😱 Bee Stings!</button>
  <button id="btn-reset" onclick="resetScene()">🔄 Reset</button>
</div>
<div id="status-bar">Click a button to start the chaos! 😄</div>

<script>
  const bee = document.getElementById('bee');
  const mangu = document.getElementById('mangu');
  const beeBubble = document.getElementById('bee-bubble');
  const manguBubble = document.getElementById('mangu-bubble');
  const manguMouth = document.getElementById('mangu-mouth');
  const sweat1 = document.getElementById('sweat1');
  const armL = document.getElementById('arm-l');
  const armR = document.getElementById('arm-r');
  const browL = document.getElementById('brow-l');
  const browR = document.getElementById('brow-r');
  const statusBar = document.getElementById('status-bar');
  const stars = [document.getElementById('star1'),document.getElementById('star2'),document.getElementById('star3')];
  const scene = document.getElementById('scene');

  let beeX = 320, beeY = 100;
  let manguX = 100;
  let animId = null;
  let beeAngle = 0;

  function setBeePx(x,y) {
    beeX = x; beeY = y;
    bee.style.left = x+'px';
    bee.style.top = y+'px';
  }
  function setManguX(x) {
    manguX = x;
    mangu.style.left = x+'px';
  }

  function showBeeBubble(txt, dur=2200) {
    beeBubble.textContent = txt;
    beeBubble.style.opacity = '1';
    clearTimeout(beeBubble._t);
    beeBubble._t = setTimeout(() => beeBubble.style.opacity='0', dur);
  }
  function showManguBubble(txt, dur=2400) {
    manguBubble.textContent = txt;
    manguBubble.style.opacity = '1';
    clearTimeout(manguBubble._t);
    manguBubble._t = setTimeout(() => manguBubble.style.opacity='0', dur);
  }
  function setStatus(txt) { statusBar.textContent = txt; }

  function scared(yes) {
    manguMouth.className = yes ? 'mouth scared' : 'mouth';
    browL.style.transform = yes ? 'rotate(15deg) translateY(-2px)' : '';
    browR.style.transform = yes ? 'rotate(-15deg) translateY(-2px)' : '';
    sweat1.style.opacity = yes ? '1' : '0';
  }

  function stopAnim() {
    if(animId) { cancelAnimationFrame(animId); animId=null; }
  }

  function spawnParticles(x,y,color,count=8) {
    for(let i=0;i<count;i++) {
      const p = document.createElement('div');
      p.className='particle';
      p.style.cssText=`width:8px;height:8px;background:${color};left:${x}px;top:${y}px;position:absolute;z-index:15;`;
      scene.appendChild(p);
      const angle = (Math.PI*2/count)*i;
      const speed = 2+Math.random()*3;
      let px=x,py=y,vx=Math.cos(angle)*speed,vy=Math.sin(angle)*speed;
      let life=40;
      function pAnim() {
        px+=vx; py+=vy; vy+=0.15; life--;
        p.style.left=px+'px'; p.style.top=py+'px';
        p.style.opacity=(life/40);
        if(life>0) requestAnimationFrame(pAnim);
        else p.remove();
      }
      requestAnimationFrame(pAnim);
    }
  }

  /* === BEE ATTACK === */
  function beeAttack() {
    stopAnim();
    scared(true);
    showBeeBubble('Bzzz! I found you! 😈');
    showManguBubble('Nahi nahi jaane do! 😱');
    armL.classList.add('waving'); armR.classList.add('waving');
    setTimeout(()=>{armL.classList.remove('waving');armR.classList.remove('waving');},1400);
    setStatus('🐝 Bee charging at Mangu!');
    mangu.style.animation = 'panicShake 0.2s infinite';

    const tX = manguX + 30, tY = 160;
    let steps = 0, total = 50;
    const sx = beeX, sy = beeY;

    function anim() {
      steps++;
      const t = steps/total;
      const wobble = Math.sin(steps*0.7)*12;
      const newX = sx + (tX-sx)*t + wobble;
      const newY = sy + (tY-sy)*t;
      setBeePx(newX, newY);
      if(steps < total) animId = requestAnimationFrame(anim);
      else {
        spawnParticles(beeX+25, beeY+15, '#ffb300', 10);
        showBeeBubble('Got you! Bzzz! 🎯');
        showManguBubble('Ouch! 😖 Haaye!');
        setStatus('💥 Bee reached Mangu!');
        mangu.style.animation = '';
        scared(false);
      }
    }
    animId = requestAnimationFrame(anim);
  }

  /* === MANGU RUN === */
  function manRun() {
    stopAnim();
    scared(true);
    showBeeBubble('Come back! Bzzzz! 🏃');
    showManguBubble('Bhago bhago! 😰');
    setStatus('🏃 Mangu is running away! Bee chasing!');
    setBeePx(manguX+80, 160);

    let step=0;
    function anim() {
      step++;
      const newMX = manguX + 3.5;
      setManguX(Math.min(newMX, 560));
      const newBeeX = beeX + 3;
      const newBeeY = 160 + Math.sin(step*0.18)*18;
      setBeePx(Math.min(newBeeX,560), newBeeY);
      if(step < 130 && manguX < 555) {
        animId = requestAnimationFrame(anim);
      } else {
        showManguBubble('Phew! Almost safe! 😅');
        showBeeBubble('Next time! Bzzz... 😤');
        setStatus('😅 Mangu escaped! (This time...)');
        scared(false);
      }
    }
    animId = requestAnimationFrame(anim);
  }

  /* === BEE CIRCLE === */
  function beeCircle() {
    stopAnim();
    scared(true);
    showBeeBubble('Round and round! 🌀');
    showManguBubble('Kyun? KYun?? KYUN??? 😵');
    setStatus('🌀 Bee is circling Mangu!');
    let angle=0, laps=0;
    const cx = manguX+30, cy = 180;

    function anim() {
      angle += 0.07;
      if(angle >= Math.PI*2) { angle-=Math.PI*2; laps++; }
      const r=80, ry=50;
      const nx = cx + r*Math.cos(angle) - 20;
      const ny = cy + ry*Math.sin(angle) - 20;
      setBeePx(nx, ny);
      if(laps<4) animId=requestAnimationFrame(anim);
      else {
        showBeeBubble('Dizzy yet? Bzzz! 😄');
        showManguBubble('Mujhe chakkar aa raha! 🌀😵');
        setStatus('😵 Mangu is totally dizzy!');
        stars.forEach((s,i)=>{ s.style.opacity='1'; s.style.animation=`flowerBob 0.8s ease-in-out ${i*0.2}s infinite`; });
        setTimeout(()=>{ stars.forEach(s=>{ s.style.opacity='0'; s.style.animation=''; }); scared(false); }, 2500);
      }
    }
    animId = requestAnimationFrame(anim);
  }

  /* === BEE STINGS === */
  function beeStings() {
    stopAnim();
    scared(true);
    showBeeBubble('Taking aim... 🎯');
    setStatus('😱 Bee is going to STING Mangu!');

    // zoom to butt
    let steps=0, total=35;
    const tX=manguX+40, tY=240;
    const sx=beeX, sy=beeY;

    function anim() {
      steps++;
      const t=steps/total;
      setBeePx(sx+(tX-sx)*t, sy+(tY-sy)*t);
      if(steps<total) { animId=requestAnimationFrame(anim); return; }

      // STING!
      spawnParticles(beeX+20,beeY+15,'#ff5722',14);
      spawnParticles(beeX+20,beeY+15,'#ffe082',8);
      showBeeBubble('⚡ BZZZZT! 💉🐝');
      showManguBubble('AAAAAHHH!! 😭🔥');
      setStatus('💥 OUCH! Mangu got STUNG!');
      mangu.style.animation='stungJump 0.6s ease-out';
      setTimeout(()=>{
        mangu.style.animation='';
        scared(false);
        showManguBubble('Bahut bura kiya! 😤 Main complaint karunga!');
        showBeeBubble('Hehe! Bzzz~ 😎');
        setStatus('🤕 Mangu is not happy. At all. 😂');
      },700);
    }
    animId=requestAnimationFrame(anim);
  }

  /* === RESET === */
  function resetScene() {
    stopAnim();
    mangu.style.animation='';
    setManguX(100);
    setBeePx(320,100);
    scared(false);
    stars.forEach(s=>{ s.style.opacity='0'; s.style.animation=''; });
    beeBubble.style.opacity='0';
    manguBubble.style.opacity='0';
    armL.classList.remove('waving'); armR.classList.remove('waving');
    setStatus('All good now! 😄 Pick an action!');
  }

  // Eyes follow bee
  setInterval(()=>{
    const mRect = mangu.getBoundingClientRect();
    const bRect = bee.getBoundingClientRect();
    const dx = bRect.left - mRect.left;
    const dy = bRect.top - mRect.top;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(2, Math.sqrt(dx*dx+dy*dy)/80);
    const px = dist*Math.cos(angle)*1.5;
    const py = dist*Math.sin(angle)*1.5;
    document.getElementById('pupil-l').style.transform=`translate(${px}px,${py}px)`;
    document.getElementById('pupil-r').style.transform=`translate(${px}px,${py}px)`;
  }, 60);
</script>
</body>
